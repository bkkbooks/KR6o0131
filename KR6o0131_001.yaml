body:
  text: 龍樹菩薩造西天譯經三藏朝奉大夫試光祿卿傳法大師賜紫臣施護等奉詔譯所有一切衆生類過未現在世無盡而諸佛剎廣無邊彼無邊剎塵充滿又一一塵為一剎廣大佛剎如塵等一一剎中正覺尊如塵無量我普禮彼塵倍聚諸佛剎剎中佛佛我稱讚我常供養以一心經如塵數廣大劫頂禮諸佛及法衆我於三寶常歸命我悉持以諸妙華及衆寶聚常普施若我已起一切罪我今普盡而懺悔若我未生一切罪我一切時常遠離所有一切勝福事我於一切常隨喜此福回向於有情及佛無上菩提果如佛正法中所說願力堅固復真實我常供養諸世尊願我最後得成佛願我生生具深智常如妙吉祥菩薩悲心息苦救世間願如觀自在菩薩賢善愛眼視衆生願與普賢尊無異慈意善觀諸情品願我常如慈氏尊布施願如虛空庫持戒願如神通慧忍辱精進二度門願我悉如常精進定力能攝諸散亂願我得如金剛手善說十地諸法門說智願如金剛藏於佛世尊善請問願我得如除蓋障深心智慧具堅固願我常如堅固慧神通無礙善方便願我得如無垢稱善護衆生諸善根勤勇願如常勇猛善說波羅蜜等法願我得如無盡意具足無量妙音聲願與妙音尊無異近善知識心無懈願我生生如善財虛空無喻法能宣願我得如虛空藏地能長養諸世間普利願如地藏尊息除貧苦利衆生願與寶藏神無異語出無盡妙法寶願我得如曇無竭智慧堅利復常勤願與常啼尊無異此等最上諸佛子最勝功德聚無邊名稱廣大復無盡願我名稱亦如是我此讚佛功德聚最上勝善極廣大普願世間諸有情住彼最勝功德聚
